[project]
name = "ui"
version = "0.1.0"
description = "A Python UI framework inspired by Flet"
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "flet>=0.85.1"
]

# [project.urls]
# "Homepage" = "https://example.com"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["ui"]
include-package-data = true

[tool.setuptools.package-dir]
ui = "cs_ui"
